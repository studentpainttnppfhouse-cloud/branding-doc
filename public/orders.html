<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeliveryProof – Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50:'#f0f9ff',100:'#e0f2fe',500:'#0ea5e9',600:'#0284c7',700:'#0369a1' } } } }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6 sticky top-0 z-50 shadow-sm">
    <a href="index.html" class="flex items-center gap-2 font-bold text-brand-700 text-lg">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 10l4.553-2.069A1 1 0 0121 8.867V17a1 1 0 01-1.447.894L15 15M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
      </svg>
      DeliveryProof
    </a>
    <a href="index.html"  class="text-sm text-gray-500 hover:text-brand-600">Dashboard</a>
    <a href="orders.html" class="text-sm font-medium text-brand-600">Orders</a>
    <a href="import.html" class="text-sm text-gray-500 hover:text-brand-600">Import</a>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-10">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Orders</h1>
        <p class="text-gray-500 text-sm mt-1" id="order-count">Loading…</p>
      </div>
      <a href="import.html" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Import Orders
      </a>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <input id="search" type="text" placeholder="Search order, customer, email…"
        class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
      <div class="flex gap-1 p-1 bg-gray-100 rounded-lg" id="filter-tabs">
        <button onclick="setFilter('all')"      class="filter-btn px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-f="all">All</button>
        <button onclick="setFilter('pending')"  class="filter-btn px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-f="pending">Pending</button>
        <button onclick="setFilter('recorded')" class="filter-btn px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-f="recorded">Recorded</button>
        <button onclick="setFilter('sent')"     class="filter-btn px-3 py-1.5 rounded-md text-sm font-medium transition-colors" data-f="sent">Sent</button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Table -->
    <div id="table-wrap" class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Order</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Customer</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Email / Phone</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Items</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Total</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</th>
              <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-gray-100">
            <tr><td colspan="7" class="px-4 py-12 text-center text-gray-400">Loading orders…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="empty" class="hidden px-4 py-16 text-center">
        <p class="text-gray-400 mb-4">No orders found</p>
        <a href="import.html" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700">Import from Shopify</a>
      </div>
    </div>
  </div>

  <script>
    const statusClasses = {
      pending:  'bg-yellow-100 text-yellow-700',
      recorded: 'bg-purple-100 text-purple-700',
      sent:     'bg-green-100 text-green-700',
    };

    let allOrders = [];
    let activeFilter = new URLSearchParams(location.search).get('filter') || 'all';

    function showToast(msg, ok = true) {
      const t = document.getElementById('toast');
      t.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${ok ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;
      t.textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 4000);
    }

    function setFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        const active = b.dataset.f === f;
        b.className = `filter-btn px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${active ? 'bg-white shadow text-brand-700' : 'text-gray-500 hover:text-gray-700'}`;
      });
      render();
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const rows = allOrders.filter(o => {
        const mf = activeFilter === 'all' || o.status === activeFilter;
        const ms = !q || (o.orderNumber||'').toLowerCase().includes(q)
                       || (o.customerName||'').toLowerCase().includes(q)
                       || (o.customerEmail||'').toLowerCase().includes(q);
        return mf && ms;
      });

      document.getElementById('order-count').textContent = `${allOrders.length} total orders`;

      if (rows.length === 0) {
        document.getElementById('tbody').innerHTML = '';
        document.getElementById('empty').classList.remove('hidden');
        return;
      }
      document.getElementById('empty').classList.add('hidden');
      document.getElementById('tbody').innerHTML = rows.map(o => `
        <tr class="hover:bg-gray-50 transition-colors" id="row-${o.id}">
          <td class="px-4 py-3 font-mono text-xs font-medium text-gray-900">${o.orderNumber || o.id.slice(0,8)}</td>
          <td class="px-4 py-3 font-medium text-gray-900">${o.customerName || '—'}</td>
          <td class="px-4 py-3 text-gray-500">
            <div>${o.customerEmail || '—'}</div>
            ${o.customerPhone ? `<div class="text-xs text-gray-400">${o.customerPhone}</div>` : ''}
          </td>
          <td class="px-4 py-3 text-gray-600 max-w-xs truncate" title="${o.lineItems||''}">${o.lineItems || '—'}</td>
          <td class="px-4 py-3 text-gray-700">${o.total || '—'}</td>
          <td class="px-4 py-3">
            <span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${statusClasses[o.status]||'bg-gray-100 text-gray-600'}">${o.status}</span>
            ${o.mediaCount ? `<div class="text-xs text-gray-400 mt-1">${o.mediaCount} file${o.mediaCount!==1?'s':''}</div>` : ''}
          </td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <a href="record.html?id=${o.id}" class="px-2 py-1 border border-gray-300 bg-white text-gray-700 rounded-lg text-xs font-medium hover:bg-gray-50">🎬 Record</a>
              ${o.status === 'recorded'
                ? `<button onclick="sendProof('${o.id}','${o.customerEmail}')" class="px-2 py-1 bg-brand-600 text-white rounded-lg text-xs font-medium hover:bg-brand-700 send-btn-${o.id}">📧 Send</button>`
                : o.status === 'sent' ? `<span class="text-xs text-green-600 font-medium">✓ Sent</span>` : ''}
              <button onclick="deleteOrder('${o.id}')" class="p-1 text-gray-400 hover:text-red-500 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>`).join('');
    }

    async function sendProof(id, email) {
      if (!confirm(`Send proof to ${email}?`)) return;
      const btn = document.querySelector(`.send-btn-${id}`);
      if (btn) { btn.disabled = true; btn.textContent = '…'; }
      try {
        const res  = await fetch('/api/send-proof', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: id }),
        });
        const data = await res.json();
        if (data.success) {
          allOrders = allOrders.map(o => o.id === id ? { ...o, status: 'sent' } : o);
          render();
          showToast(`✓ Proof sent to ${email}`);
        } else {
          showToast(data.error || 'Send failed', false);
          if (btn) { btn.disabled = false; btn.textContent = '📧 Send'; }
        }
      } catch (e) {
        showToast('Network error', false);
        if (btn) { btn.disabled = false; btn.textContent = '📧 Send'; }
      }
    }

    async function deleteOrder(id) {
      if (!confirm('Delete this order?')) return;
      await fetch(`/api/orders/${id}`, { method: 'DELETE' });
      allOrders = allOrders.filter(o => o.id !== id);
      render();
    }

    // Init
    setFilter(activeFilter);
    document.getElementById('search').addEventListener('input', render);

    fetch('/api/orders')
      .then(r => r.json())
      .then(({ orders = [] }) => { allOrders = orders; render(); })
      .catch(() => {
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="7" class="px-4 py-12 text-center text-red-400">Could not connect to server</td></tr>';
      });
  </script>
</body>
</html>
